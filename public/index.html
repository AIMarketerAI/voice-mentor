<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voice Mentor</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    h1 { font-weight: 600; }
    #talk {
      font-size: 22px;
      padding: 20px 40px;
      border-radius: 50px;
      border: none;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }
    #talk.listening { background: #dc2626; } /* turns red while listening */
    #status { color: #666; min-height: 24px; margin-top: 16px; }
    #transcript {
      text-align: left;
      margin-top: 24px;
      line-height: 1.5;
    }
    .you    { color: #4f46e5; }
    .mentor { color: #111; }
  </style>
</head>
<body>
  <h1>🎙️ Voice Mentor</h1>
  <p>Press the button, speak your thought, and your mentor will reply out loud.</p>

  <button id="talk">Hold on… loading</button>
  <p id="status"></p>
  <div id="transcript"></div>

  <script>
    // ---- Grab references to our page elements ----
    const talkButton = document.getElementById("talk");
    const status = document.getElementById("status");
    const transcript = document.getElementById("transcript");

    // The whole conversation so far, in the format Claude's API expects.
    // We send the full history every time so the mentor remembers context.
    const messages = [];

    // ---- 1. Speech-to-text (built into Chrome) ----
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      status.textContent = "Sorry — this browser doesn't support speech recognition. Use Chrome.";
      talkButton.disabled = true;
    } else {
      talkButton.textContent = "🎤 Tap to speak";
    }

    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if (recognition) {
      recognition.lang = "en-GB";

      // When Chrome has understood what you said:
      recognition.onresult = (event) => {
        const spoken = event.results[0][0].transcript;
        addLine("You", spoken, "you");
        sendToMentor(spoken);
      };

      recognition.onend = () => talkButton.classList.remove("listening");
      recognition.onerror = (e) => (status.textContent = "Didn't catch that — try again. (" + e.error + ")");
    }

    talkButton.addEventListener("click", () => {
      speechSynthesis.cancel();          // stop the mentor mid-sentence if needed
      talkButton.classList.add("listening");
      status.textContent = "Listening…";
      recognition.start();
    });

    // ---- 2. Send the conversation to our server, get the mentor's reply ----
    async function sendToMentor(spokenText) {
      messages.push({ role: "user", content: spokenText });
      status.textContent = "Thinking…";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages }),
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);

        messages.push({ role: "assistant", content: data.reply });
        addLine("Mentor", data.reply, "mentor");
        speak(data.reply);
        status.textContent = "";
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    }

    // ---- 3. Text-to-speech (also built into the browser) ----
    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-GB";
      utterance.rate = 1.0;
      speechSynthesis.speak(utterance);
    }

    // ---- Small helper to show the conversation on screen ----
    function addLine(who, text, cssClass) {
      const p = document.createElement("p");
      p.className = cssClass;
      p.textContent = who + ": " + text;
      transcript.appendChild(p);
      p.scrollIntoView();
    }
  </script>
</body>
</html>
