<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Mentor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #000000;
      color: #ffffff;
    }

    .widget-card {
      background-color: #000000;
      border: 1px solid #222222;
      border-radius: 16px;
      padding: 24px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #635bff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: white;
    }
    .avatar svg { width: 40px; height: 40px; fill: currentColor; }
    h1 { font-size: 22px; font-weight: 700; color: #ffffff; margin-bottom: 6px; }
    p.subtitle { font-size: 14px; color: #aaaaaa; margin-bottom: 24px; }
    
    .input-group {
      position: relative;
      margin-bottom: 16px;
    }
    input[type="text"] {
  width: 100%;
  padding: 12px 40px 12px 16px;
  background-color: #111111;
  color: #ffffff;
  border: 1px solid #333333;
  border-radius: 12px;
  font-size: 14px;
  outline: none;
}
    .mic-icon {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #cccccc;
}

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-call { background: #10a37f; color: white; display: block; }
    .btn-call:hover { background: #0e8e6f; }
    .btn-end { background: #e53e3e; color: white; display: none; }
    .btn-end:hover { background: #c53030; }

    .status { font-size: 13px; color: #777; margin-top: 12px; min-height: 20px; }
    .transcript {
      margin-top: 20px;
      text-align: left;
      font-size: 13px;
      color: #444;
      background: #fafafa;
      padding: 12px;
      border-radius: 12px;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #eee;
    }
  </style>
</head>
<body>

  <div class="card">
<div class="avatar" style="width: 120px; height: 120px; margin: 0 auto 16px;">
      <img src="/images/profile.jpg" alt="AI Mark" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;" />
    </div>
    <h1>AI Mark</h1>
    <p class="subtitle">Ask a question by typing or speaking.</p>

    <div class="input-group">
      <input type="text" id="textInput" placeholder="Type your question..." />
      <span class="mic-icon">🎤</span>
    </div>

    <button id="callBtn" class="btn-call">📞 Call</button>
    <button id="endBtn" class="btn-end">🛑 End Call</button>

    <div class="status" id="status"></div>
    <div class="transcript" id="transcript" style="display:none;"></div>
  </div>
<audio id="audio-player" playsinline preload="auto"></audio>
  <script>
    const SESSION_TOKEN = "__SESSION_TOKEN__";
    let messages = [];
    let callRecognizer = null;
    let currentAudio = null;

    function $(id) {
      return document.getElementById(id);
    }

    function setStatus(text) {
      const el = $("status");
      if (el) el.innerText = text;
    }

    function appendTranscript(sender, text) {
      const box = $("transcript");
      if (!box) return;
      box.style.display = "block";
      const p = document.createElement("p");
      p.style.marginBottom = "6px";
      p.innerHTML = "<strong>" + sender + ":</strong> " + text;
      box.appendChild(p);
      box.scrollTop = box.scrollHeight;
    }

    function speakFallback(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.onend = () => {
          setStatus("Listening...");
          if ($("endBtn").style.display === "block") {
            listenNextTurn();
          }
        };
        window.speechSynthesis.speak(u);
      }
    }

async function askMentor(text) {
      const player = document.getElementById("audio-player");
  if (player && !player.src) {
    player.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
    player.play().catch(e => console.log("Audio warm up suppressed:", e));
  }
  // Only show the message in transcript if it's NOT a system event
      if (!text.startsWith("[SYSTEM EVENT")) {
        appendTranscript("You", text);
      }
      
      messages.push({ role: "user", content: text });
      setStatus("Thinking...");

      if (callRecognizer) {
        try { callRecognizer.abort(); } catch (_) {}
      }

      try {
        const r = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + SESSION_TOKEN,
          },
          body: JSON.stringify({ messages }),
        });

        const data = await r.json();
        if (!r.ok) throw new Error(data.error || "Request failed");

        messages.push({ role: "assistant", content: data.reply });
        appendTranscript("Mentor", data.reply);
        setStatus("Speaking...");

        if (data.audio) {
      const player = document.getElementById("audio-player");
      player.src = "data:audio/mp3;base64," + data.audio;
      player.onended = () => {
        setStatus("Listening...");
        if ($("endBtn").style.display === "block") {
          listenNextTurn();
        }
      };
      player.play().catch(err => console.error("Playback error:", err));
    } else {
      speakFallback(data.reply);
    }

        return data.reply;
      } catch (err) {
        console.error("Chat error:", err);
        setStatus("⚠️ " + (err.message || "Error connecting."));
      }
    }

function listenNextTurn() {
      if (!callRecognizer || $("endBtn").style.display !== "block") return;
      
      setStatus("Listening...");
      try {
        callRecognizer.start();
      } catch (err) {
        // If it's already running or starting up, ignore the error
        console.warn("Speech recognition start attempt:", err.message);
      }
    }

    async function startCall() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) {
        alert("Speech recognition is not supported in this browser.");
        return;
      }

      $("callBtn").style.display = "none";
$("endBtn").style.display = "block";
if ($("transcript")) $("transcript").style.display = "block";

// Warm up audio player on user interaction (iOS fix)
const player = document.getElementById("audio-player");
if (player) {
  player.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
  player.play().catch(() => {});
}

// Trigger greeting from AI Mark
// Instant local playback (0ms delay)
appendTranscript("Mentor", "Hi, I'm AI Mark! How can I help you?");

      // 1. Initialize a SINGLE speech recognition instance for the entire call
      callRecognizer = new Speech();
      callRecognizer.continuous = false;
      callRecognizer.interimResults = false;

      callRecognizer.onresult = async (e) => {
        const text = e.results[0][0].transcript.trim();
        if (text.length > 0) {
          await askMentor(text);
        }
      };

      callRecognizer.onerror = (e) => {
        // Log errors without forcing rapid re-initialization loops
        console.warn("Recognizer error:", e.error);
      };

      callRecognizer.onend = () => {
        // When audio finishes or times out naturally, restart quietly if call is active
        if ($("endBtn").style.display === "block" && $("status").innerText === "Listening...") {
          setTimeout(() => {
            if ($("endBtn").style.display === "block") {
              try { callRecognizer.start(); } catch (_) {}
            }
          }, 300);
        }
      };

      setStatus("Listening...");
setTimeout(() => {
  if (callRecognizer) {
    try { callRecognizer.start(); } catch (_) {}
  }
}, 300);
    }

    function endCall() {
      if (callRecognizer) {
        callRecognizer.onend = null;
        try { callRecognizer.abort(); } catch (_) {}
      }

      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }

      $("callBtn").style.display = "block";
      $("endBtn").style.display = "none";
      setStatus("Call ended.");
    }

    $("callBtn").onclick = startCall;
    $("endBtn").onclick = endCall;

    const input = $("textInput");
    if (input) {
      input.addEventListener("keydown", async (e) => {
        if (e.key === "Enter" && input.value.trim()) {
          const val = input.value.trim();
          input.value = "";
          await askMentor(val);
        }
      });
    }
  </script>
</body>
</html>
