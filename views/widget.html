<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mark</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .widget-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 24px;
        }
        .title {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            align-self: flex-start;
        }
        .subtitle {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 18px;
            color: #a1a1a6;
            margin-bottom: 28px;
            align-self: flex-start;
        }
        .input-box {
            width: 100%;
            background-color: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .input-box input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            width: 100%;
            outline: none;
        }
        .input-box input::placeholder { color: #8e8e93; }
        .mic-icon { width: 20px; height: 20px; opacity: 0.7; }
        .call-btn {
            width: 100%;
            background-color: #129e75;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <img class="avatar" src="/images/profile.jpg" alt="Mark">
        <h1 class="title">AI Mark</h1>
        <p class="subtitle">Ask a question by typing or speaking.</p>
        
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Type your question...">
            <svg class="mic-icon" viewBox="0 0 24 24" fill="white">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </div>

        <button class="call-btn" id="callBtn">
            <span>📞</span> Call
        </button>
    </div>
</body>
</html>
