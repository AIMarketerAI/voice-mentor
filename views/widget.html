<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mark Widget</title>
    <script src="https://cdn.jsdelivr.net/npm/@elevenlabs/client-script@1.0.0/dist/index.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #d4af37; margin-top: 20px; }
        h1 { font-size: 24px; margin: 15px 0 5px; font-weight: bold; }
        p { color: #aaa; font-size: 14px; margin-bottom: 30px; }
        .call-btn { background: #28a745; color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; max-width: 300px; box-shadow: 0 4px 15px rgba(40,167,69,0.4); }
        .call-btn.active { background: #dc3545; box-shadow: 0 4px 15px rgba(220,53,69,0.4); }
    </style>
</head>
<body>

    <img src="https://www.marklaxton.com/aimark/wp-content/uploads/2026/07/Al-Mark.png" class="profile-img" alt="Al Mark">
    <h1>Al Mark</h1>
    <p>Tap the button below to start your briefing</p>

    <button id="callBtn" class="call-btn">Call</button>

    <script>
        const AGENT_ID = "agent_9301kxtgngjfen6bxcpgvx0a2hbf";
        let conversation = null;
        const callBtn = document.getElementById('callBtn');

        callBtn.addEventListener('click', async () => {
            if (!conversation) {
                try {
                    callBtn.textContent = "Connecting...";
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    conversation = await ElevenLabsConversation.startSession({
                        agentId: AGENT_ID,
                        onConnect: () => {
                            callBtn.textContent = "End Briefing";
                            callBtn.classList.add('active');
                        },
                        onDisconnect: () => {
                            conversation = null;
                            callBtn.textContent = "Call";
                            callBtn.classList.remove('active');
                        },
                        onError: (error) => {
                            console.error("ElevenLabs Error:", error);
                            alert("Connection failed. Please check microphone permissions.");
                            conversation = null;
                            callBtn.textContent = "Call";
                            callBtn.classList.remove('active');
                        }
                    });
                } catch (err) {
                    console.error("Mic Access Error:", err);
                    alert("Please allow microphone access to talk to Al Mark.");
                    callBtn.textContent = "Call";
                }
            } else {
                await conversation.endSession();
            }
        });
    </script>
</body>
</html>
